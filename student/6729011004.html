<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>โปรไฟล์ของฉัน</title>
    <style>
        body {
            font-family: "Sarabun", sans-serif;
            background: linear-gradient(135deg, #ffd6e0, #cce7ff, #e0ffe0);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffffcc;
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            color: #ff8fab;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
            color: #555;
        }

        span {
            font-weight: bold;
            color: #7aa2f7;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🌸 โปรไฟล์ของฉัน 🌸</h2>
    <p><span>ชื่อ-นามสกุล :</span> นางสาวธัญวลัย อัศวาภิรมย์</p>
    <p><span>ชื่อเล่น :</span> มี่</p>
    <p><span>ความสามารถพิเศษ :</span> นอน 😴</p>
</div>

</body>
</html>
